name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy-staging:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Set image tag
        run: echo "IMAGE=ghcr.io/${{ github.repository_owner }}/devops-cicd-lab:sha-${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

      - name: Simulate deploy to staging
        run: |
          echo "🚀 Deploying to staging"
          echo "Using image: $IMAGE"

  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Simulate smoke test
        run: |
          echo "🔍 Running smoke tests against staging"
          echo "Smoke test passed"

  deploy-production:
    needs: smoke-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Set image tag
        run: echo "IMAGE=ghcr.io/${{ github.repository_owner }}/devops-cicd-lab:sha-${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

      - name: Simulate deploy to production
        run: |
          echo "🚀 Deploying to production"
          echo "Using image: $IMAGE"